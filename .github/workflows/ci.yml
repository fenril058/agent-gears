name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: mdidx (test / vet / govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: cmd/mdidx
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: cmd/mdidx/go.mod
          cache: false  # mdidx has no external deps, so there is no go.sum to key the cache on
      - run: go vet ./...
      - run: go test ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  shellcheck:
    name: shellcheck (install.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - run: shellcheck install.sh

  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      # validates the mdidx package, devShell, and formatter; also the receiver
      # that verifies Dependabot's nix (flake.lock) bump PRs.
      - run: nix flake check

  workflow-lint:
    name: workflow lint (ghalint / zizmor / pinact)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix run nixpkgs#ghalint -- run
      - run: nix run nixpkgs#zizmor -- .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}
      - run: nix run nixpkgs#pinact -- run --check
        env:
          GITHUB_TOKEN: ${{ github.token }}
